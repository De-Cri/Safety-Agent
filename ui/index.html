<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safety Agent</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo">Safety Agent</span>
      </div>
      <button class="new-chat-btn" id="newChatBtn">+ Nuova chat</button>
    </aside>

    <main class="chat-area">
      <div class="messages" id="messages">
        <div class="welcome">
          <h2>Ciao, come posso aiutarti?</h2>
          <p>Chiedimi informazioni sugli eventi di sicurezza registrati dalle telecamere.</p>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="userInput"
            placeholder="Scrivi un messaggio..."
            rows="1"
          ></textarea>
          <button id="sendBtn" aria-label="Invia">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="chat.js"></script>
</body>
</html>
